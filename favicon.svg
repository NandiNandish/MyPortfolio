<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" fill="#0f1419" rx="36"/>
  <!-- Gradient circle background -->
  <circle cx="90" cy="90" r="85" fill="url(#grad1)" opacity="0.15"/>
  <!-- Main circle with gradient border -->
  <circle cx="90" cy="90" r="75" fill="none" stroke="url(#grad1)" stroke-width="3"/>
  <!-- Initials EBN -->
  <text x="90" y="108" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">EBN</text>
  <!-- Small accent line -->
  <line x1="45" y1="135" x2="135" y2="135" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
